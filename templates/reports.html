{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h5>📊 Relatórios</h5>
  <small class="text-muted">Exporte os dados das partidas</small>
</div>

<form action="/reports/export" method="POST" class="mb-3">
  <button class="btn btn-primary btn-sm">📄 Exportar todas partidas (XLSX)</button>
</form>

<div class="card p-2">
  <h6>Resumo</h6>
  <div class="row">
    <div class="col">
      <div class="small text-muted">Total</div>
      <div class="h5">{{ stats.total }}</div>
    </div>
    <div class="col">
      <div class="small text-muted">Ao vivo</div>
      <div class="h5 text-danger">{{ stats.live }}</div>
    </div>
    <div class="col">
      <div class="small text-muted">Finalizadas</div>
      <div class="h5">{{ stats.total - stats.live }}</div>
    </div>
  </div>
</div>

{% endblock %}
