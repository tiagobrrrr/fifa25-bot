<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FIFA25 Bot</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0d1117;
            color: #e5e7eb;
        }

        /* NAVBAR PREMIUM */
        header.navbar {
            background: linear-gradient(90deg, #0f172a, #1e40af);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: #fff !important;
            letter-spacing: .5px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            padding-top: 60px;
            background: #111827;
            box-shadow: 4px 0 12px rgba(0,0,0,0.2);
        }

        .sidebar a {
            color: #cbd5e1;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            font-size: 15px;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #fff;
        }

        /* CONTEÚDO */
        .content {
            margin-left: 260px;
            padding: 20px;
        }

        /* CARTÕES */
        .card {
            background: #1e293b;
            border: none;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        .live-badge {
            background: #ef4444;
            padding: 4px 8px;
            color: white;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Última varredura */
        .last-scan {
            color: #fff !important;
            font-weight: 600;
            font-size: 14px;
            margin-left: 2px;
        }

        /* Tabela */
        table th, table td {
            color: #e2e8f0;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">FIFA25 Bot</a>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/"><span>📊</span> Dashboard</a>
        <a href="/matches"><span>⚽</span> Partidas</a>
        <a href="/players"><span>🧑</span> Jogadores</a>
        <a href="/reports"><span>📁</span> Relatórios</a>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <div class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-3">
                    {% for category, msg in messages %}
                        <div class="alert alert-{{ 'success' if category=='success' else 'danger' }}" role="alert">
                            {{ msg }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
