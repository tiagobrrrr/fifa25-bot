<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FIFA25 Bot Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Premium CSS -->
    <style>
        body {
            background: #0f0f10;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
        }

        .premium-navbar {
            background: linear-gradient(90deg, #0f172a, #1e3a8a);
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #111827;
            padding-top: 80px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
        }

        .sidebar a {
            display: block;
            padding: 14px 22px;
            color: #d1d5db;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: #ffffff;
        }

        .content-area {
            margin-left: 250px;
            padding: 25px;
        }

        .card-premium {
            background: #1e293b;
            border: none;
            border-radius: 12px;
            padding: 20px;
            color: #f8fafc;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .last-scan {
            color: #ffffff !important;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .live-badge {
            background: #ef4444;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg premium-navbar fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="/">FIFA25 Bot · Premium</a>
    </div>
</nav>

<div class="sidebar">
    <a href="/">📊 Dashboard</a>
    <a href="/matches">⚽ Partidas</a>
    <a href="/players">👤 Jogadores</a>
    <a href="/reports">📁 Relatórios</a>
</div>

<div class="content-area">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, msg in messages %}
                    <div class="alert alert-{{ 'success' if category=='success' else 'danger' }}">
                        {{ msg }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="card-premium">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
