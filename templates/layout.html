<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FIFA25 Bot Dashboard</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6fb; }
    header.navbar { background: linear-gradient(90deg,#0f172a,#1e3a8a); }
    .card { box-shadow: 0 6px 18px rgba(16,24,40,0.06); }
    .table-sm th, .table-sm td { vertical-align: middle; }
    .live-badge { background:#ef4444; color:white; font-weight:600; padding:4px 8px; border-radius:6px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">FIFA25 Bot</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/matches">Partidas</a></li>
        <li class="nav-item"><a class="nav-link" href="/players">Jogadores</a></li>
        <li class="nav-item"><a class="nav-link" href="/reports">Relatórios</a></li>
      </ul>

      <form class="d-flex" role="search" action="/players" method="get">
        <input name="q" class="form-control form-control-sm me-2" type="search" placeholder="Buscar jogador..." aria-label="Buscar">
        <button class="btn btn-outline-light btn-sm" type="submit">Buscar</button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-3">
        {% for category, msg in messages %}
          <div class="alert alert-{{ 'success' if category=='success' else 'danger' }}" role="alert">
            {{ msg }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="row">
    <div class="col-12">
      <div class="card p-3">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
