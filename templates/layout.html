<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA25 Bot Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #1e3a8a;
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 24px;
        }

        nav {
            background: #0f172a;
            padding: 12px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: #fff;
        }

        .container {
            max-width: 1100px;
            margin: 25px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        table th {
            background: #1e3a8a;
            color: white;
        }

        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .warning { color: orange; font-weight: bold; }
    </style>

</head>
<body>

<header>
    FIFA25 — Bot Dashboard
</header>

<nav>
    <a href="/">Dashboard</a>
    <a href="/matches">Partidas</a>
    <a href="/players">Jogadores</a>
    <a href="/reports">Relatórios</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul style="list-style: none; padding: 0;">
                {% for category, msg in messages %}
                    <li class="{{ category }}">{{ msg }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
