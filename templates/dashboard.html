<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FIFA 25 – Live Scraper</title>
    <style>
        body {
            background: #0f172a;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 10px;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        select, button {
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #020617;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #1e293b;
            text-align: left;
        }

        th {
            background: #020617;
        }

        .status {
            margin-bottom: 10px;
            color: #22c55e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ FIFA 25 – Dashboard</h1>

    <div class="status">
        🟢 Scraper ativo e coletando automaticamente
    </div>

    <!-- 🔥 5 OPÇÕES -->
    <form class="filters" method="get">
        <select name="league">
            <option value="">Todas as ligas</option>
            {% for l in leagues %}
                <option value="{{ l }}">{{ l }}</option>
            {% endfor %}
        </select>

        <select name="stadium">
            <option value="">Todos os estádios</option>
            {% for s in stadiums %}
                <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
        </select>

        <button type="submit">Filtrar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Liga</th>
                <th>Estádio</th>
                <th>Horário</th>
                <th>Coletado em</th>
            </tr>
        </thead>
        <tbody>
            {% for m in matches %}
            <tr>
                <td>{{ m.league }}</td>
                <td>{{ m.stadium }}</td>
                <td>{{ m.match_time }}</td>
                <td>{{ m.created_at.strftime('%d/%m %H:%M:%S') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
